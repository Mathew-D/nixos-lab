[bar]
order = [ "Main" ]

    [bar.Main]
    attach_panels = true
    background_opacity = 0.66999995708465576
    capsule_groups = [ "Monitoring", "Sound" ]
    capsule_opacity = 0.0
    center = [ "active_window", "media" ]
    contact_shadow = true
    end = [ "tray", "group:g1", "notifications", "clipboard", "group:g2", "network", "caffeine", "clock", "control-center" ]
    margin_edge = 5
    margin_ends = 0
    margin_h = 0
    margin_v = 0
    padding = 12
    reserve_space = true
    scale = 1.2000000476837158
    start = [ "launcher", "taskbar" ]
    thickness = 31

        [[bar.Main.capsule_group]]
        fill = "surface_variant"
        id = "g1"
        members = [ "ram", "cpu", "temp" ]
        opacity = 0.0
        padding = 6.0
        radius = 6.0

        [[bar.Main.capsule_group]]
        fill = "surface_variant"
        id = "g2"
        members = [ "volume", "input_volume" ]
        opacity = 0.0
        padding = 6.0
        radius = 6.0

[battery.device."/org/freedesktop/UPower/devices/battery_hidpp_battery_0"]
warning_threshold = 55

[calendar]
enabled = true

 
[control_center]
compact = false
sidebar = "full"
sidebar_section = "full"

    [[control_center.shortcuts]]
    type = "caffeine"

    [[control_center.shortcuts]]
    type = "notification"

[desktop_widgets]
enabled = false

[dock]
active_monitor_only = true
enabled = false
show_instance_count = true
show_running = true

[idle]
behavior_order = [ "lock", "screen-off" ]
pre_action_fade_seconds = 10

    [idle.behavior.lock]
    action = "lock"
    command = "noctalia:screen-lock"
    enabled = true
    timeout = 600

    [idle.behavior.screen-off]
    action = "screen_off"
    command = "noctalia:dpms-off"
    enabled = true
    resume_command = "noctalia:dpms-on"
    timeout = 660

[location]
address = "Bowmanville. Canada"

[lockscreen]
blur_intensity = 0.0
tint_intensity = 0.0


[lockscreen_widgets]
enabled = false
schema_version = 1
widget_order = [
]

    [lockscreen_widgets.grid]
    cell_size = 16
    major_interval = 4
    visible = true

   

[noctalia_state]
setup_wizard_completed = true

[osd]
position = "top_right"

    [osd.kinds]
    media = false

[shell]
avatar_path = ""
clipboard_auto_paste = "off"
clipboard_confirm_clear_history = false
clipboard_image_action_command = "satty -f -"
font_family = "Noto Sans"
lang = "en"
password_style = "random"
polkit_agent = true
screen_time_enabled = true
settings_show_advanced = true
telemetry_enabled = true
time_format = "{:%-I:%M %p}"

    [shell.panel]
    attach_clipboard = true
    attach_wallpaper = false
    control_center_placement = "floating"
    session_placement = "centered"
    transparency_mode = "glass"
    wallpaper_placement = "floating"

    [shell.screenshot]
    copy_to_clipboard = true
    freeze_screen = true
    pipe_command = "satty -f -"

    [[shell.session.actions]]
    action = "lock"
    enabled = true
    shortcut = "1"
    variant = "default"

    [[shell.session.actions]]
    action = "logout"
    enabled = true
    shortcut = "2"
    variant = "default"

    [[shell.session.actions]]
    action = "suspend"
    enabled = false
    shortcut = "3"
    variant = "default"

    [[shell.session.actions]]
    action = "reboot"
    enabled = true
    shortcut = "4"
    variant = "default"

    [[shell.session.actions]]
    action = "shutdown"
    enabled = true
    shortcut = "5"
    variant = "destructive"

[system.monitor]
gpu_poll_seconds = 5

[theme]
builtin = "Noctalia"
source = "community"
wallpaper_scheme = "m3-content"

    [theme.templates]
    builtin_ids = [ "btop", "foot", "gtk3", "gtk4",  "qt", "niri" ]
    community_ids = [ "vscode" ]

[wallpaper]
directory = ""

    [wallpaper.automation]
    order = "random"


[weather]
address = "Bowmanville, Canada"

[widget.battery]
capsule_group = "Monitoring"
device = "/org/freedesktop/UPower/devices/battery_hidpp_battery_0"

[widget.clock]
format = "{:%a, %b %-d  %-I:%M %p }"
vertical_format = "{:%a, %b %-d \\n %-I:%M %p }"

[widget.cpu]
capsule_group = "Monitoring"
highlight_color = "on_surface"
show_label = false

[widget.gpu-usage]
stat = "gpu_usage"
type = "sysmon"

[widget.input_volume]
capsule_group = "Sound"
show_label = false

[widget.launcher]
capsule_fill = "surface"
scale = 1.25

[widget.network]
show_label = false

[widget.ram]
capsule_group = "Monitoring"
highlight_color = "on_surface"
show_label = false

[widget.taskbar]
anchor = false
group_by_workspace = true
workspace_label_placement = "centered"

[widget.temp]
capsule = true
capsule_group = "Monitoring"
highlight_color = "on_surface"
show_label = false

[widget.volume]
capsule_group = "Sound"
show_label = false

[widget.workspaces]
anchor = false
capsule = false
display = "name"
empty_color = "tertiary"
